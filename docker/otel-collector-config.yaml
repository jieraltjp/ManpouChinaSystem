# OTel Collector 配置
# 接收来自 Java（micrometer-tracing-bridge-otel）和 Python（opentelemetry-python-sdk）的 OTLP 数据
# 转发至 Grafana Tempo 进行存储

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # 转发到 Grafana Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # 同时打印到 stdout（本地调试用）
  logging:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, logging]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
