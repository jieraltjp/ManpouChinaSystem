# ============================================================
# commitlint 配置
# 强制执行 Conventional Commits 规范
# ============================================================

extends:
  - '@commitlint/config-conventional'

rules:
  # 提交类型（必须）
  type-enum:
    - 2
    - always
    - - feat      # 新功能
      - fix       # Bug 修复
      - docs      # 文档变更
      - style     # 代码格式（不影响功能）
      - refactor  # 重构
      - perf      # 性能优化
      - test      # 测试
      - chore     # 构建/工具变更
      - ci        # CI 配置
      - build     # 构建系统
      - revert    # 回滚

  # 类型格式：必须小写
  type-case:
    - 2
    - always
    - lower-case

  # 主题（描述）不能为空
  subject-empty:
    - 2
    - never

  # 主题不能以句号结尾
  subject-full-stop:
    - 2
    - never
    - .

  # 主题最大长度
  subject-max-length:
    - 2
    - always
    - 100

  # 正文最大行长度
  body-max-line-length:
    - 2
    - always
    - 100

  # Header 最大长度
  header-max-length:
    - 2
    - always
    - 120
