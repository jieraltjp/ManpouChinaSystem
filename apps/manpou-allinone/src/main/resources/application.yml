server:
  port: ${SERVER_PORT:18090}
  servlet:
    context-path: /

spring:
  application:
    name: ${APP_NAME:manpou-allinone}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
    alibaba:
      cloud:
        enabled: false

  datasource:
    url: jdbc:mysql://192.168.13.202:${MYSQL_PORT:23306}/${DB_NAME:manpou}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:manpou23306}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5000

spring.cloud.nacos.discovery:
  server-addr: ${NACOS_SERVER:nacos}:8848
  namespace: ${NACOS_NAMESPACE:dev}
  group: ${SERVICE_GROUP:DEFAULT_GROUP}
  enabled: false

spring.cloud.gateway.discovery.locator.enabled: false

logging:
  level:
    root: INFO
    com.manpou.allinone: DEBUG
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId}","thread":"%t","logger":"%logger{36}","msg":"%msg"}%n'
  org.hibernate.SQL: WARN
  org.hibernate.type.descriptor.sql.BasicBinder: WARN

jwt:
  access-token-ttl-seconds: 900
  key:
    algorithm: RS256
  # JWT 跨服务验证配置（方案B — 从 user-service 拉取公钥）
  verifier:
    endpoint: http://127.0.0.1:18081/api/v1/auth/keys
    refresh-interval-seconds: 300

app:
  config:
    source: ${CONFIG_SOURCE:properties}
    local:
      path: ${CONFIG_LOCAL_PATH:config/local.yaml}
    nacos:
      data-id: ${spring.application.name}
      group: ${SERVICE_GROUP:DEFAULT_GROUP}

# 腾讯云 COS 对象存储配置（SPEC-C12）
cos:
  enabled: ${COS_ENABLED:true}
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  bucket: ${COS_BUCKET:manpou-1324246219}
  region: ${COS_REGION:ap-tokyo}
  domain: ${COS_DOMAIN:https://manpou-1324246219.cos.ap-tokyo.myqcloud.com}
  prefix: ${COS_PREFIX:qc-images/}
  max-file-size: ${COS_MAX_FILE_SIZE:5242880}

management:
  endpoints:
    web.exposure.include: health,info,metrics,prometheus
  endpoint:
    health.show-details: when_authorized
  metrics.tags:
    service: ${spring.application.name}
