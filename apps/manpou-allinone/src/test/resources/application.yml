spring:
  profiles:
    active: test
  config:
    import: "optional:nacos:"
  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        ddl_extra_settings: ON_ERROR_ROLLBACK
        javax:
          persistence:
            schema-generation:
              create-database-schemas: false
  flyway:
    enabled: false

logging:
  level:
    root: WARN
    com.manpou.allinone: DEBUG
