server:
  port: ${SERVER_PORT:18081}
  servlet:
    context-path: /

spring:
  application:
    name: ${APP_NAME:user-service}

  # Nacos 配置中心（本地 dev 无 Docker 时禁用检查；生产环境启用需设置 spring.profiles.active=dev）
  cloud:
    nacos:
      config:
        enabled: false        # 禁用 Nacos 配置中心客户端
        import-check:
          enabled: false
    alibaba:
      cloud:
        enabled: false        # 禁用 Spring Cloud Alibaba 自动配置

  # 数据源（本地 MySQL 23306）
  datasource:
    url: jdbc:mysql://192.168.13.202:23306/manpou?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: manpou
    password: manpou203
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA 配置
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none  # 禁用 Hibernate schema 管理，依赖 Flyway 或手动维护
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # Flyway 数据库迁移（已禁用，列管理由 ApplicationRunner 处理）
  flyway:
    enabled: false

  # Redis（暂无使用，待安装 Redis 后启用）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5000

# Spring Cloud Alibaba Nacos 注册中心（本地禁用，需要时设置 spring.profiles.active=dev）
spring.cloud.nacos.discovery:
  server-addr: ${NACOS_SERVER:nacos}:8848
  namespace: ${NACOS_NAMESPACE:dev}
  group: ${SERVICE_GROUP:DEFAULT_GROUP}
  enabled: false

# Spring Cloud Gateway 路由配置
spring.cloud.gateway.discovery.locator.enabled: false

# 日志配置（结构化 JSON）
logging:
  level:
    root: INFO
    com.manpou.user: DEBUG
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId}","thread":"%t","logger":"%logger{36}","msg":"%msg"}%n'
  org.hibernate.SQL: WARN
  org.hibernate.type.descriptor.sql.BasicBinder: WARN

# JWT 配置（RS256 密钥从环境变量加载，classpath keys/ 为 fallback）
jwt:
  access-token-ttl-seconds: 86400     # 1 天
  key:
    algorithm: RS256                   # 非对称签名，公钥暴露给前端
    kid: ${JWT_KID:e57043d2}          # 密钥 ID，写入 token header "kid"
    # 私钥（用于签发 token）：环境变量或 application-local.yml
    private: ${JWT_PRIVATE_KEY:}
    # 公钥（用于 allinone 跨服务验签）：环境变量或 application-local.yml
    public: ${JWT_PUBLIC_KEY:}

# ============================================================
# ConfigSource 配置（ADR-0014 Phase A — 配置抽象层）
# 选择配置源：properties(默认) / local(开发/CI) / nacos(生产)
# ============================================================
app:
  audit-log:
    secret: ${AUDIT_LOG_SECRET:CHANGE-ME-AUDIT-SECRET}  # allinone 写入日志的校验密钥
  config:
    source: ${CONFIG_SOURCE:properties}       # 配置源类型
    local:
      path: ${CONFIG_LOCAL_PATH:config/local.yaml}  # local 模式时的配置文件路径
    nacos:
      data-id: ${spring.application.name}     # Nacos data-id
      group: ${SERVICE_GROUP:DEFAULT_GROUP}  # Nacos group

# Actuator 端点（生产按需开启）
management:
  endpoints:
    web.exposure.include: health,info,metrics,prometheus
  endpoint:
    health.show-details: when_authorized
    health.redis.enabled: false    # Redis 未安装时排除健康检查
  health:
    redis:
      enabled: false               # 禁用 Redis 健康指标
  metrics.tags:
    service: ${spring.application.name}
