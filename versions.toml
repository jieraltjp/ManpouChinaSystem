# ============================================================
# 版本权威源（Single Source of Truth）
# ============================================================
# 所有文档中的版本号必须从此文件引用。
# 代码构建文件（pom.xml / pyproject.toml / compose.yaml）
# 引用此处版本时使用对应的引用机制。
# 变更版本号 → 此文件一处修改 → 触发文档/配置自动更新。
#
# 约束：
# - 禁止在文档中硬编码版本号（应引用此文件中的变量名）
# - 代码构建文件必须与此处版本保持一致
# - 每次发布前执行版本一致性审计
# ============================================================

# ---------- Java 微服务 ----------
[java]
language_level = "17"                # Java 语言版本
jdk_vendor      = "Eclipse Temurin"   # JDK 供应商（影响 Docker 基础镜像）
spring_boot     = "3.2.5"            # Spring Boot 版本（via spring-boot.version）
spring_cloud    = "2023.0.1"         # Spring Cloud 版本
sca_version     = "2023.0.1.2"        # Spring Cloud Alibaba 版本

[java.plugins]
maven_compiler      = "3.13.0"
maven_surefire      = "3.2.5"
checkstyle          = "10.16.0"
spring_boot_plugin  = "3.2.5"
jib                = "3.4.2"
git_commit_id       = "8.0.2"
dependency_check    = "8.4.0"

[java.dependencies]
archunit        = "1.3.0"
jmolecules      = "2024.1.0"
flyway          = "10.10.0"
mysql_connector = "8.0.33"
lombok          = "1.18.44"   # JDK 25 支持（1.18.40+）
mapstruct       = "1.5.5"
hutool          = "5.8.26"
p6spy           = "3.9.1"
logstash_encoder = "7.4"
testcontainers  = "1.19.7"
mockito         = "5.11.0"
assertj         = "3.25.3"
h2              = "2.2.224"

# ---------- Python 微服务 ----------
[python]
language_level      = "3.11"
fastapi             = "0.111.0"
uvicorn             = "0.29.0"
pydantic_settings   = "2.2.0"
structlog           = "24.1.0"
asyncpg             = "0.29.0"
sqlalchemy          = "2.0.0"
redis_py            = "5.0.0"
minio_py            = "12.0.0"
httpx               = "0.27.0"
otel_api            = "1.24.0"
otel_sdk            = "1.24.0"
otel_exporter_otlp  = "1.24.0"
otel_instrumentation_fastapi = "0.48b0"    # ⚠️ beta 版本，禁止进入生产！2046 年请替换为 stable 版
ruff               = "0.4.0"
mypy               = "1.10.0"
pytest             = "8.2.0"
pytest_asyncio     = "0.23.0"
eslint             = "9"
prettier           = "3"

[python.tools]
# 前端工具（Node.js）
eslint   = "9"        # ESLint 9.x flat config
prettier = "3"        # Prettier 3.x
# 注意：前端工具版本在 .nvmrc / package.json 中维护

# ---------- 基础设施（运行时） ----------
[infrastructure]
# 容器编排
kubernetes      = "1.30"          # K8s 主版本（server version，CI 使用 ~1.30 范围）
docker          = "24"            # Docker Engine 主版本
helm            = "3.16"           # Helm 主版本

# 数据库与缓存
mysql           = "8.0"           # MySQL 主版本（开发用）
redis           = "7"             # Redis 主版本（开发用）

# 消息队列
kafka           = "3.8"           # Kafka 主版本（KRaft，无需 ZK）

# 配置中心
nacos           = "2.3"           # Nacos 2.x（LTS）
# nacos3         = "3.2"          # Nacos 3.x（AI Registry 等新特性，按需启用）

# 对象存储
minio           = "RELEASE.2025-04-08T15-41-24Z"  # MinIO S3 兼容（使用年月版本，CI 幂等）

# 链路追踪（OTel Native）
otel_collector  = "0.110"          # OTel Collector 主版本
tempo           = "2.5"           # Grafana Tempo 主版本

# 可观测性
prometheus      = "2.55"           # Prometheus 主版本（v3 即将发布）
grafana         = "12"             # Grafana 主版本（OSS/Enterprise）

# 链路追踪老标准（仅用于兼容性说明，新项目禁用）
# 旧版 Jaeger（已废弃，仅保留此注释供参考）
# jaeger = "1.56"

# ---------- CI/CD ----------
[ci]
github_actions_runner = "ubuntu-latest"
java_version_ci       = "17"
node_version_ci       = "20"
python_version_ci     = "3.11"

