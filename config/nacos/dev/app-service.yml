# ============================================================
# Java 微服务 - 应用配置（dev 环境）
# 文件名：{service-name}-dev.yml
# 上传到 Nacos dev 命名空间
# ============================================================

server:
  port: 8080

spring:
  application:
    name: app-service

  # 注册中心
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
        namespace: dev
        group: DEFAULT_GROUP
        enabled: true
        register-enabled: true

    # API Gateway（无需在本配置中声明，由 Gateway 服务提供路由）
    gateway:
      enabled: false

  # Nacos 配置中心
  config:
    import: optional:nacos:shared-common.yml

  # 本地开发：使用 H2，无需 TiDB
  datasource:
    url: jdbc:h2:mem:appdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update  # dev 环境允许自动更新表结构
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: redis
      port: 6379
      password: redis123
      database: 0

# 日志
logging:
  level:
    root: INFO
    com.company: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
