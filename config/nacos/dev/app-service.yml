# ============================================================
# Java 微服务 - 应用配置（dev 环境）
# 文件名：{service-name}-dev.yml
# 上传到 Nacos dev 命名空间
# ============================================================

server:
  port: 8080

spring:
  application:
    name: app-service

  # 注册中心
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
        namespace: dev
        group: DEFAULT_GROUP
        enabled: true
        register-enabled: true

    # API Gateway（无需在本配置中声明，由 Gateway 服务提供路由）
    gateway:
      enabled: false

  # Nacos 配置中心
  config:
    import: optional:nacos:shared-common.yml

  # 数据源（MySQL）
  datasource:
    url: jdbc:mysql://${DB_HOST:192.168.13.202}:${DB_PORT:23306}/${DB_NAME:manpou}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:manpou23306}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none  # 依赖 Flyway 或手动维护
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: redis
      port: 6379
      password: redis123
      database: 0

# 日志
logging:
  level:
    root: INFO
    com.company: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
